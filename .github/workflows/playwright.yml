name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TESTMO_URL: ${{ secrets.TESTMO_URL }}
      TESTMO_TOKEN: ${{ secrets.TESTMO_TOKEN }}
      TESTMO_PROJECT_ID: ${{ secrets.TESTMO_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run tests
        run: npm run test

      - name: Validate Testmo case mapping
        if: always()
        id: validate_testmo_mapping
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const searchRoots = ['test-results', 'playwright-report'];
          const xmlFiles = [];
          const seen = new Set();

          function walk(dir) {
            if (!fs.existsSync(dir)) {
              return;
            }
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const fullPath = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                walk(fullPath);
              } else if (entry.isFile() && fullPath.endsWith('.xml')) {
                const normalized = path.normalize(fullPath);
                if (!seen.has(normalized)) {
                  seen.add(normalized);
                  xmlFiles.push(normalized);
                }
              }
            }
          }

          for (const root of searchRoots) {
            walk(root);
          }

          const testcaseNameRegex = /<testcase\b[^>]*\bname="([^"]+)"/g;
          const testmoCaseIdPrefixRegex = /^\[C\d+\]/;
          const unmapped = [];
          let mappedCount = 0;
          let testcaseCount = 0;

          for (const file of xmlFiles) {
            const content = fs.readFileSync(file, 'utf8');
            let match;
            while ((match = testcaseNameRegex.exec(content)) !== null) {
              testcaseCount += 1;
              const testName = match[1];
              if (testmoCaseIdPrefixRegex.test(testName)) {
                mappedCount += 1;
              } else {
                unmapped.push(`${file}: ${testName}`);
              }
            }
          }

          const githubOutput = process.env.GITHUB_OUTPUT;
          if (!githubOutput) {
            throw new Error('GITHUB_OUTPUT is not set');
          }

          if (xmlFiles.length === 0 || testcaseCount === 0) {
            console.log('No JUnit XML testcases found; skipping Testmo submission to avoid uploading unmapped results.');
            fs.appendFileSync(githubOutput, 'ready=false\n');
            process.exit(0);
          }

          if (mappedCount === 0) {
            console.log('No mapped testcases found with a Testmo case ID prefix. Skipping Testmo submission.');
            fs.appendFileSync(githubOutput, 'ready=false\n');
            process.exit(0);
          }

          if (unmapped.length > 0) {
            console.log(`Found ${unmapped.length} testcase(s) without a Testmo case ID prefix. Continuing with mapped testcase submission readiness.`);
            for (const entry of unmapped.slice(0, 20)) {
              console.log(`- ${entry}`);
            }
            if (unmapped.length > 20) {
              console.log(`- ... and ${unmapped.length - 20} more`);
            }
          }

          console.log(`Validated ${testcaseCount} JUnit testcase(s); found ${mappedCount} mapped testcase(s) with a Testmo case ID prefix.`);
          fs.appendFileSync(githubOutput, 'ready=true\n');
          NODE

      - name: Submit results to Testmo
        if: always() && env.TESTMO_URL != '' && env.TESTMO_TOKEN != '' && env.TESTMO_PROJECT_ID != '' && steps.validate_testmo_mapping.outputs.ready == 'true'
        run: npm run testmo:submit

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/

      - name: Deploy test results to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: playwright-report
